name = "freeideastore-mcp"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[routes]]
pattern = "mcp.freeideastore.online"
zone_name = "freeideastore.online"
custom_domain = true

[vars]
API_BASE = "https://api.freeappstore.online"
GITHUB_ORG = "freeideastore-online"
PLATFORM_REPO = "platform"
PUBLIC_BASE = "https://freeideastore.online"
FIS_API_BASE = "https://freeideastore.online"

# Secrets:
#   GITHUB_TOKEN - optional PAT for future pro-book export tooling.
#   SESSION_SIGNING_KEY - shared FAS auth HMAC key for MCP OAuth.

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "FisMcp" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FisMcp"]
